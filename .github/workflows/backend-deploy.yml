name: Deploy Backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

env:
  ACR_NAME: cadb0cdce808acr
  CONTAINER_APP_NAME: lisbot-api
  RESOURCE_GROUP: rg-lisbot-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/lisbot-api:${{ github.sha }}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}

      - name: Health Check
        run: |
          sleep 10
          curl -f "https://lisbot-api.livelysea-c2fc3fbf.eastasia.azurecontainerapps.io/api/health" || exit 1
