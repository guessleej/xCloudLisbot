name: Deploy Backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

env:
  # terraform apply 後從 output acr_login_server 取得，格式：crxmeetXXXXXX.azurecr.io
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  CONTAINER_APP_NAME: ca-lisbot-backend
  RESOURCE_GROUP: rg-lisbot-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          ACR_NAME=$(echo ${{ env.ACR_LOGIN_SERVER }} | cut -d. -f1)
          az acr login --name $ACR_NAME

      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/lisbot-backend:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ACR_LOGIN_SERVER }}/lisbot-backend:latest"
          docker build -t $IMAGE -t $IMAGE_LATEST .
          docker push $IMAGE
          docker push $IMAGE_LATEST
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}

      - name: Health check
        run: |
          sleep 15
          BACKEND_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          curl -f "https://${BACKEND_URL}/api/health" || exit 1
