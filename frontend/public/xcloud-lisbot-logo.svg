<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1B3E;stop-opacity:1" />
    </linearGradient>
    <!-- X gradient -->
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:1" />
    </linearGradient>
    <!-- Node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0" />
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="400" height="400" rx="40" ry="40" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#00D4FF" stroke-width="0.5">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>

  <!-- Connection lines (neural network style) -->
  <g opacity="0.25" stroke="#00D4FF" stroke-width="1" fill="none">
    <!-- Left node connections -->
    <line x1="95" y1="160" x2="162" y2="195"/>
    <line x1="95" y1="240" x2="162" y2="205"/>
    <!-- Right node connections -->
    <line x1="305" y1="160" x2="238" y2="195"/>
    <line x1="305" y1="240" x2="238" y2="205"/>
    <!-- Center connections -->
    <line x1="175" y1="145" x2="200" y2="175"/>
    <line x1="225" y1="145" x2="200" y2="175"/>
    <line x1="175" y1="255" x2="200" y2="225"/>
    <line x1="225" y1="255" x2="200" y2="225"/>
  </g>

  <!-- X Icon - main mark (two crossing thick bars) -->
  <g filter="url(#glow)">
    <!-- Left-top to right-bottom bar -->
    <line x1="145" y1="130" x2="255" y2="270"
          stroke="url(#xGrad)" stroke-width="28" stroke-linecap="round"/>
    <!-- Right-top to left-bottom bar -->
    <line x1="255" y1="130" x2="145" y2="270"
          stroke="url(#xGrad)" stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- Center diamond highlight -->
  <polygon points="200,186 214,200 200,214 186,200"
           fill="#00D4FF" opacity="0.9" filter="url(#glow)"/>

  <!-- Connection nodes -->
  <!-- Left-top -->
  <circle cx="95" cy="160" r="8" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
  <circle cx="95" cy="160" r="5" fill="#00D4FF"/>
  <!-- Left-bottom -->
  <circle cx="95" cy="240" r="8" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
  <circle cx="95" cy="240" r="5" fill="#00D4FF"/>
  <!-- Right-top -->
  <circle cx="305" cy="160" r="8" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
  <circle cx="305" cy="160" r="5" fill="#00D4FF"/>
  <!-- Right-bottom -->
  <circle cx="305" cy="240" r="8" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
  <circle cx="305" cy="240" r="5" fill="#00D4FF"/>
  <!-- Top nodes -->
  <circle cx="175" cy="145" r="5" fill="#7B2FFF" filter="url(#softGlow)"/>
  <circle cx="225" cy="145" r="5" fill="#7B2FFF" filter="url(#softGlow)"/>
  <!-- Bottom nodes -->
  <circle cx="175" cy="255" r="5" fill="#7B2FFF" filter="url(#softGlow)"/>
  <circle cx="225" cy="255" r="5" fill="#7B2FFF" filter="url(#softGlow)"/>

  <!-- Wordmark: XMeet AI -->
  <text x="200" y="324"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="30"
        font-weight="700"
        letter-spacing="4"
        fill="white"
        text-anchor="middle"
        filter="url(#softGlow)">
    <tspan fill="#00D4FF">X</tspan>Meet
    <tspan fill="url(#xGrad)"> AI</tspan>
  </text>

  <!-- Tagline -->
  <text x="200" y="350"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="3"
        fill="#6B8BAD"
        text-anchor="middle">
    INTELLIGENT MEETINGS
  </text>

  <!-- Top accent line -->
  <line x1="160" y1="365" x2="240" y2="365"
        stroke="url(#xGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
